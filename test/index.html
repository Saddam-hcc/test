<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="wrapper">
        <form>
            <h1>Login</h1>
            <div class="box-input">
                <label for="name" class="lab">Name or Email</label>
                <input id="name" type="text" class="inp" placeholder="Name or Email" required name="name">
            </div>
            <div class="box-input">
                <label for="pass" class="lab">Password</label>
                <input id="pass" type="password" class="inp" placeholder="Password" name="password" required>
            </div>
            <div>
                <label class="check"><input type="checkbox">Remember me</label>
                <a href="#" class="forgot-link">Forgot Password</a>
            </div>
            <button type="submit" class="btn">Login</button>
        </form>
    </div>
</body>

</html>
