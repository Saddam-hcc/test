<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-test2</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="wrapper">
        <form>
            <h1>Login</h1>
            <div class="input-box">
                <label for="txt" class="lab">User Name or Email</label>
                <input id="txt" type="text" placeholder="User Name or Email" required name="name">
            </div>
            <div class="input-box">
                <label for="pass" class="lab">Password</label>
                <input id="pass" type="password" placeholder="Example 123@#..." required name="password">
            </div>
            <button type="submit">Login</button>
            <div class="forgot-link">
                <a href="#">Forgot Password</a>
            </div>
        </form>
    </div>
</body>

</html>
